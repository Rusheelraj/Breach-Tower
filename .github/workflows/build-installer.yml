name: Build Windows Installer

on:
  push:
    tags:
      - "v*"          # trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # allow manual trigger from the Actions tab

permissions:
  contents: write   # needed to upload release assets

jobs:
  # ── Job 1: Go CLI installer ─────────────────────────────────────────────────
  build-cli:
    name: Build breach-tower-installer.exe (CLI)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: installer/go.sum

      - name: Tidy and download Go dependencies
        working-directory: installer
        run: |
          go mod tidy
          go mod download

      - name: Resolve version string
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          # workflow_dispatch has ref_name = "main" — default to 1.0.0
          if (-not $ver -or $ver -notmatch '^\d') { $ver = "1.0.0" }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Install goversioninfo (embeds version info + UAC manifest)
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      - name: Generate versioninfo.json and resource.syso
        working-directory: installer
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $parts = ($ver + ".0.0.0") -split '\.' | Select-Object -First 4
          $fi = [PSCustomObject]@{
            Major = [int]$parts[0]; Minor = [int]$parts[1]
            Patch = [int]$parts[2]; Build = [int]$parts[3]
          }
          $json = [ordered]@{
            FixedFileInfo = @{
              FileVersion    = $fi
              ProductVersion = $fi
            }
            StringFileInfo = @{
              FileDescription  = "Breach Tower Windows Installer"
              FileVersion      = $ver
              InternalName     = "breach-tower-installer"
              LegalCopyright   = "Private - All Rights Reserved"
              OriginalFilename = "breach-tower-installer.exe"
              ProductName      = "Breach Tower"
              ProductVersion   = $ver
            }
            VarFileInfo  = @{ Translation = @{ LangID = 1033; CharsetID = 1200 } }
            IconPath     = ""
            ManifestPath = "breach-tower-installer.manifest"
          }
          $json | ConvertTo-Json -Depth 10 | Out-File -FilePath versioninfo.json -Encoding utf8NoBOM
          goversioninfo -o resource.syso versioninfo.json

      - name: Build installer exe
        working-directory: installer
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o breach-tower-installer.exe .

      - name: Upload exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: breach-tower-installer-windows-amd64
          path: installer/breach-tower-installer.exe
          retention-days: 30

      - name: Attach exe to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/breach-tower-installer.exe
          body: |
            ## Breach Tower Installer

            **Windows:** Download `breach-tower-installer.exe` and double-click to install.
            A UAC prompt will appear — click **Yes** to grant Administrator access.

            **Linux:**
            ```bash
            cd /tmp && sudo bash -c "$(curl -fsSL https://raw.githubusercontent.com/Rusheelraj/Breach-Tower/main/install.sh)"
            ```

  # ── Job 2: WPF GUI installer ────────────────────────────────────────────────
  build-wpf:
    name: Build breach-tower-setup.exe (WPF GUI)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version string
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          if (-not $ver -or $ver -notmatch '^\d') { $ver = "1.0.0" }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        working-directory: installer-wpf
        run: dotnet restore

      - name: Publish self-contained single-file exe
        working-directory: installer-wpf
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}.0 `
            -p:FileVersion=${{ steps.version.outputs.VERSION }}.0 `
            -p:InformationalVersion=${{ steps.version.outputs.VERSION }} `
            -o publish

      - name: Rename output
        working-directory: installer-wpf
        run: |
          Rename-Item publish\breach-tower-installer.exe breach-tower-setup.exe

      - name: Upload WPF exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: breach-tower-setup-windows-amd64
          path: installer-wpf/publish/breach-tower-setup.exe
          retention-days: 30

      - name: Attach WPF exe to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer-wpf/publish/breach-tower-setup.exe
